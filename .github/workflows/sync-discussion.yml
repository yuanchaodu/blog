name: Sync Markdown to GitHub Discussions

on:
  push:
    branches:
      - main
    paths:
      - "content/**/*.md"

concurrency:
  group: sync-discussions-${{ github.ref }}
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.BLOG_SECRET }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install gray-matter @octokit/graphql
    
      - name: Get changed markdown files
        id: changed
        run: |
          before="${{ github.event.before }}"
          after="${{ github.sha }}"
          git fetch origin "$before" || true
          files=$(git diff --name-only "$before" "$after" -- 'content/**/*.md')
          {
            echo "files<<EOF"
            echo "$files"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Sync discussions
        if: steps.changed.outputs.files != ''
        env:
          GITHUB_TOKEN: ${{ secrets.BLOG_SECRET }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          CHANGED_FILES: ${{ steps.changed.outputs.files }}
        run: node scripts/sync-discussion/sync.js

      - name: Commit discussion ids
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add content
          git diff --cached --quiet || git commit -m "chore: sync discussion metadata"
          git push